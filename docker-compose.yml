services:
  postgres:
    image: postgres:16-alpine
    container_name: campus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: campus
      POSTGRES_USER: campus
      POSTGRES_PASSWORD: campus_dev
    ports:
      - "5432:5432"
    volumes:
      - campus-pg-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campus -d campus"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend-api:
    build:
      context: ./services/backend-api
    container_name: campus-backend-api
    restart: unless-stopped
    environment:
      ConnectionStrings__Campus: "Host=postgres;Port=5432;Database=campus;Username=campus;Password=campus_dev"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  authz:
    image: openfga/openfga:latest
    container_name: campus-authz
    restart: unless-stopped
    command: run --datastore-engine memory --playground-enabled
    ports:
      - "127.0.0.1:8081:8080" # HTTP API — loopback-only, not for external access
      - "127.0.0.1:8082:3000" # Playground UI, dev convenience only
    # No healthcheck: the openfga image ships no shell/wget/curl to probe with.
    # `curl http://localhost:8081/healthz` from the host confirms liveness instead.

  ai-services:
    build:
      context: ./services/ai-services
    container_name: campus-ai-services
    restart: unless-stopped
    # Stub only — Track 2 owns the real implementation (self-hosted models
    # for AIS-01/03/04/07, Copyleaks/Pangram for AIS-02/05).
    ports:
      - "8090:8000"

  judge0-db:
    image: postgres:16-alpine
    container_name: campus-judge0-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0_dev
    volumes:
      - campus-judge0-db-data:/var/lib/postgresql/data

  judge0-redis:
    image: redis:7-alpine
    container_name: campus-judge0-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "judge0_redis_dev"]

  # Code Execution Service (CEX) — runs untrusted student code (SEK-01).
  # judge0-server only orchestrates the queue/API; it does not itself run
  # submissions, so it stays unprivileged.
  judge0-server:
    image: judge0/judge0:1.13.1
    container_name: campus-judge0-server
    restart: unless-stopped
    volumes:
      - ./services/code-execution/judge0.conf:/judge0.conf:ro
    ports:
      - "127.0.0.1:2358:2358" # loopback-only; backend-api reaches it over the compose network
    depends_on:
      - judge0-db
      - judge0-redis

  # judge0-workers is where submissions actually execute inside isolate
  # sandboxes. `privileged: true` is required for isolate's cgroup/namespace
  # setup — this is the one deliberate privilege-escalation in this stack,
  # scoped to only this container, with no published ports (unreachable from
  # the host or from any other service directly) and every resource/network
  # limit in judge0.conf locked down (ENABLE_NETWORK=false, hard CPU/memory/
  # process ceilings) so a malicious submission can't escape, exhaust the
  # host, or reach the network from inside its sandbox.
  judge0-workers:
    image: judge0/judge0:1.13.1
    container_name: campus-judge0-workers
    restart: unless-stopped
    command: ["./scripts/workers"]
    privileged: true
    volumes:
      - ./services/code-execution/judge0.conf:/judge0.conf:ro
    depends_on:
      - judge0-db
      - judge0-redis

volumes:
  campus-pg-data:
  campus-judge0-db-data:
