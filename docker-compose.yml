services:
  postgres:
    image: postgres:16-alpine
    container_name: campus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: campus
      POSTGRES_USER: campus
      POSTGRES_PASSWORD: campus_dev
    ports:
      - "5432:5432"
    volumes:
      - campus-pg-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campus -d campus"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  campus-pg-data:
