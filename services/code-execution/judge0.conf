# Judge0 configuration — local dev, self-hosted (CEX container).
# This runs untrusted student code, so every limit here is deliberately
# conservative. Do not relax without re-reviewing the security implications.

# --- Datastore ---
POSTGRES_HOST=judge0-db
POSTGRES_PORT=5432
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=judge0_dev

REDIS_HOST=judge0-redis
REDIS_PORT=6379
REDIS_PASSWORD=judge0_redis_dev

# --- Resource ceilings per submission (hard caps, not defaults) ---
MAX_CPU_TIME_LIMIT=15
MAX_CPU_EXTRA_TIME=5
MAX_WALL_TIME_LIMIT=20
MAX_MEMORY_LIMIT=256000
MAX_STACK_LIMIT=64000
MAX_PROCESSES_AND_OR_THREADS=60
MAX_FILE_SIZE=4096
MAX_NUMBER_OF_RUNS=20

# --- Network isolation ---
# Submitted code must never reach the network — no exfiltration, no
# calling out to other containers/services from inside a submission.
ENABLE_NETWORK=false
ALLOW_ENABLE_NETWORK=false

# --- Queueing / throughput guards ---
MAX_QUEUE_SIZE=100
INTERVAL=0.1
COUNT=1

# --- Auth: this is internal-only (called by backend-api on the Docker
# network, never exposed directly to students), but require a token
# anyway so a compromised container on the same network can't submit
# arbitrary code for execution without it.
AUTHN_HEADER=X-Judge0-Auth
AUTHN_TOKEN=dev-only-judge0-token-change-me

ENABLE_WAIT_RESULT=true
ENABLE_COMPILER_OPTIONS=false
ALLOWED_LANGUAGES_FOR_COMPILE_OPTIONS=
ENABLE_COMMAND_LINE_ARGUMENTS=false
ENABLE_SUBMISSION_DELETE=false
